<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- this is how Event Listeners are added in the INLINE way AND Do Not Forget to write something inside the Button tag-->
    <button onclick = "console.log('God is Great1')">Click Me 1</button>
    <button id ="Button2" >Click Me 2</button>
    <button id ="Button3" >Click Me 3</button>

    
    <!-- As Long as there is an External JS file Linked via src, the content inside Script won't work. -->
    <script src="EventListener.js">

        let Button2 = document.getElementById("Button2");
        Button2.onclick=()=>{
            console.log('God is Great2');
        }

    </script>
</body>
</html>
