<section class="counter">
  <h3>Event Binding Practice</h3>
  <p>Count: {{ count }}</p>

  <div class="actions">
    <button type="button" (click)="decrement()">-</button>
    <button type="button" (click)="increment()">+</button>
    <button type="button" (click)="reset()">Reset</button>
  </div>
</section>
